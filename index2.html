<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sec 1 G3: Interactive Geometry Net Lab</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    
    <script>
      AFRAME.registerComponent('toggle-net', {
        init: function () {
          this.isNet = false;
          this.el.addEventListener('click', () => {
            const solid = this.el.querySelector('.solid');
            const net = this.el.querySelector('.net');
            const formula = this.el.querySelector('.formula');
            
            this.isNet = !this.isNet;
            solid.setAttribute('visible', !this.isNet);
            net.setAttribute('visible', this.isNet);
            formula.setAttribute('visible', this.isNet);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse">
      <a-entity environment="preset: starry; grid: 1x1; gridColor: #38bdf8"></a-entity>

      <a-text value="CLICK SHAPES TO UNFOLD NETS" position="-2 3.5 -4" color="#38bdf8" width="10"></a-text>

      <a-entity position="-3 1.5 -4" toggle-net>
        <a-entity class="solid">
            <a-cone radius-bottom="0.8" height="1.5" color="#38bdf8" opacity="0.6"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-cone>
            <a-entity line="start: 0 -0.75 0; end: 0.8 -0.75 0; color: #f472b6"></a-entity>
            <a-text value="r" position="0.4 -0.6 0" color="#f472b6" align="center"></a-text>
            <a-entity line="start: 0 -0.75 0; end: 0 0.75 0; color: #FFFFFF"></a-entity>
            <a-text value="h" position="-0.2 0 0" color="#FFF" align="center"></a-text>
        </a-entity>
        <a-entity class="net" visible="false">
            <a-circle radius="0.8" rotation="-90 0 0" position="0 -1 0" color="#f472b6"></a-circle>
            <a-cone radius-bottom="1.2" height="0.1" theta-length="200" rotation="90 0 0" color="#38bdf8"></a-cone>
        </a-entity>
        <a-text class="formula" value="V = 1/3 * PI * r^2 * h\nArea = PI*r^2 + PI*r*l" 
                position="0 -2 0" align="center" color="#FFF" visible="false"></a-text>
      </a-entity>

      <a-entity position="0 1.5 -4" toggle-net>
        <a-entity class="solid">
            <a-sphere radius="0.8" color="#f472b6" opacity="0.6" wireframe="true"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-sphere>
            <a-entity line="start: 0 0 0; end: 0.8 0 0; color: #38bdf8"></a-entity>
            <a-text value="r" position="0.4 0.1 0" color="#38bdf8" align="center"></a-text>
        </a-entity>
        <a-entity class="net" visible="false">
            <a-sphere radius="0.8" color="#f472b6" opacity="0.3" wireframe="true" segments-height="4"></a-sphere>
            <a-text value="Sphere nets are complex!\nThink of an orange peel." position="0 1.2 0" align="center" color="#38bdf8"></a-text>
        </a-entity>
        <a-text class="formula" value="V = 4/3 * PI * r^3\nArea = 4 * PI * r^2" 
                position="0 -2 0" align="center" color="#FFF" visible="false"></a-text>
      </a-entity>

      <a-entity position="3 1.5 -4" toggle-net>
        <a-entity class="solid">
            <a-cylinder radius="0.8" height="1.5" segments-radial="3" color="#38bdf8" opacity="0.6"
                        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-cylinder>
            <a-text value="H" position="0.5 0 0" color="#FFF"></a-text>
        </a-entity>
        <a-entity class="net" visible="false">
            <a-plane width="1.4" height="1.5" position="0 0 0" color="#38bdf8"></a-plane>
            <a-plane width="1.4" height="1.5" position="-1.4 0 0" color="#38bdf8"></a-plane>
            <a-plane width="1.4" height="1.5" position="1.4 0 0" color="#38bdf8"></a-plane>
            <a-circle segments="3" radius="0.8" rotation="-90 0 0" position="0 1.1 0" color="#f472b6"></a-circle>
            <a-circle segments="3" radius="0.8" rotation="-90 0 0" position="0 -1.1 0" color="#f472b6"></a-circle>
        </a-entity>
        <a-text class="formula" value="V = Base Area * H\nArea = 2B + (Perimeter * H)" 
                position="0 -2 0" align="center" color="#FFF" visible="false"></a-text>
      </a-entity>

      <a-camera position="0 1.6 0">
        <a-cursor color="#38bdf8"></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
